# Frozen paper scope for Interpretability-First Symbolic Regression (IF-SR).
#
# This file freezes the scope of the paper BEFORE any confirmatory result is
# looked at. Nothing here may be changed on the basis of final results. Changing
# any field requires an explicit protocol amendment recorded in git history.

meta:
  paper_working_title: "Interpretability-First Symbolic Regression for Noisy Black-Box Scientific Data"
  frozen_on: "2026-07-13"
  primary_venue: "IEEE BigData 2026 Full Paper (CCF C)"
  status: frozen
  amendment_policy: >
    Tasks, splits, rubric, ExprSim weights and delta may not be changed after
    freezing on the basis of observed confirmatory results. Only reproducible
    evidence of a bug justifies a recorded amendment.

# The two research questions the paper answers. No third question is allowed.
research_questions:
  rq1: >
    On real noisy data without a known ground-truth formula, can IF-SR keep
    test R^2 essentially unchanged while producing expressions that human
    experts and independent LLMs find more interpretable?
  rq2: >
    When a complex ground-truth formula is known, does IF-SR keep its R^2 and
    interpretability advantage while also producing expressions structurally
    closer to the true expression?

# Two core experiments only. Do not add more.
experiments:
  experiment_1_real_blackbox:
    description: "Real black-box scientific data with no identifiable true formula."
    n_main_tasks: 6
    metrics: [test_r2, human_interpretability_score, llm_a_interpretability_score, llm_b_interpretability_score]
    auxiliary_diagnostics: [nrmse, expanded_node_count, n_variables, failure_rate, wall_time]
  experiment_2_known_formula:
    description: "Data generated by known complex ground-truth formulas."
    n_tasks: 20
    n_tasks_minimum_after_reduction: 15
    metrics: [test_r2, human_interpretability_score, llm_a_interpretability_score, llm_b_interpretability_score, expr_sim]
    extra_metrics: [algebraic_equivalence_success, numeric_equivalence_success, support_f1]
    noise_setting: "5% target noise + 5 irrelevant variables"

# Comparison conditions. Frozen. External baseline is added only after the four
# internal conditions pass end-to-end.
methods:
  - id: raw_pysr
    name: "PySR"
    description: "Standard complexity-error selection."
    group: internal
  - id: external_sr_baseline
    name: "SISSO++ (fallback: Operon)"
    description: "External symbolic regression baseline."
    group: external
  - id: mine_pysr
    name: "Mine-PySR"
    description: "Data-mined factors + PySR, no domain-semantic selection."
    group: internal
  - id: if_sr
    name: "IF-SR"
    description: "Full interpretability-first pipeline."
    group: internal
  - id: if_sr_no_domain
    name: "IF-SR w/o domain factors"
    description: "Interpretability-first selection without approved domain factors."
    group: internal

# Primary metrics used for the paper's main claims.
primary_metrics:
  - test_r2
  - human_interpretability_score
  - llm_a_interpretability_score
  - llm_b_interpretability_score
  - expr_sim   # experiment 2 only

# Accuracy tolerance band. Frozen.
accuracy_tolerance:
  delta: 0.02
  definition: "acceptable set = candidates with R2_val >= best_R2_val - delta"
  metric_space: validation_only

# Confirmatory seeds. Frozen.
seeds:
  confirmatory: [20260709, 20260710, 20260711]
  n_confirmatory: 3

# Interpretability rubric dimensions (see configs/interpretability_rubric.json).
interpretability_rubric:
  version: "rubric_v1"
  scale: [1, 5]
  dimensions:
    - domain_meaning
    - structural_plausibility
    - readability_generalizability
    - hypothesis_support
  aggregation: "per-dimension mean and overall mean; human and LLM never averaged together"

# Expression similarity weights (experiment 2). Frozen.
expr_sim_weights:
  version: "exprsim_v1"
  numeric_similarity: 0.50
  variable_set_f1: 0.20
  operator_set_f1: 0.20
  tree_structure_similarity: 0.10

# Hard rules that may not be relaxed under any resource constraint.
non_negotiable:
  - "No leakage: test labels never touch preprocessing, mining, prompts, constant fitting or selection."
  - "Independent test set evaluated exactly once, after formula lock."
  - "Blind rating export with isolated private mapping."
  - "Failure and timeout logging retained; failed seeds never silently deleted."
  - "Two independent LLM judges; at least two human raters for the main evaluation."
  - "LLM judges used for evaluation never participate in IF-SR final selection."

# If resources are insufficient, cut in this order (never touch non_negotiable).
reduction_order:
  - "Drop supplementary clean condition."
  - "Do not expand remaining real targets."
  - "Do not add seeds."
  - "Do not add a second external baseline."
  - "Reduce known-formula tasks from 20 to a minimum of 15 (keep stratified sampling)."
